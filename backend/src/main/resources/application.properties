# Tên của ứng dụng
spring.application.name=backend

# Cấu hình kết nối Database PostgreSQL
# Lưu ý: redlight_db phải là tên Database bạn đã tạo trong pgAdmin
spring.datasource.url=jdbc:postgresql://localhost:5432/redlight_db
spring.datasource.username=postgres
spring.datasource.password=kien0901
spring.datasource.driver-class-name=org.postgresql.Driver

# Cấu hình Hibernate (Tự động tạo bảng dựa trên code Java)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Cổng chạy server Backend (Tránh trùng với React là 5173)
server.port=8080